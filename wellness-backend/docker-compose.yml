version: '3.8'
services:
  mysql:
    image: mysql:8.4
    container_name: wellness-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: wellness_house
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: 
      context: ./WellnessAPI
      dockerfile: Dockerfile
    ports:
      - "5077:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseProvider=MySql
      - ConnectionStrings__MySqlConnection=Server=mysql;Port=3306;Database=wellness_house;User=root;Password=root1234;
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ../wellness-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
